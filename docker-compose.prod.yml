services:
  cockpit_db:
    image: postgres:15-alpine
    container_name: cockpit_db_prod
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - cockpit_postgres_data_prod:/var/lib/postgresql/data
    networks:
      - cockpit_network_prod
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  cockpit_redis:
    image: redis/redis-stack-server:latest
    container_name: cockpit_redis_prod
    volumes:
      - cockpit_redis_data_prod:/data
    command: redis-stack-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - cockpit_network_prod
    restart: always

  cockpit_api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cockpit_api_prod
    env_file:
      - .env
    environment:
      - DB_HOST=cockpit_db
      - REDIS_STORE_URL=redis://:${REDIS_PASSWORD}@cockpit_redis:6379
    ports:
      - '8000:8000'
    depends_on:
      cockpit_db:
        condition: service_healthy
      cockpit_redis:
        condition: service_started
    networks:
      - cockpit_network_prod
    restart: always

networks:
  cockpit_network_prod:
    driver: bridge

volumes:
  cockpit_postgres_data_prod:
  cockpit_redis_data_prod:
