name: Deploy to Production

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy"]
    types:
      - completed
    branches: [master]

jobs:
  deploy-to-production:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RASPBERRY_PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}
            User ${{ secrets.RASPBERRY_PI_USERNAME }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            ServerAliveInterval 30
            ServerAliveCountMax 5
          EOF
          chmod 600 ~/.ssh/config
        shell: bash

      - name: Copy deploy script and env to Pi
        run: |
          cat > /tmp/deploy.env << 'EOF'
          export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}'
          export GITHUB_ACTOR='${{ github.actor }}'
          export DB_USER='${{ secrets.DB_USER }}'
          export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
          export DB_HOST='${{ secrets.DB_HOST }}'
          export DB_NAME='${{ secrets.DB_NAME }}'
          export DB_PORT='${{ secrets.DB_PORT }}'
          export CORS_ORIGINS='${{ secrets.CORS_ORIGINS }}'
          export JWT_SECRET_KEY='${{ secrets.JWT_SECRET_KEY }}'
          export JWT_ALGORITHM='${{ secrets.JWT_ALGORITHM }}'
          export JWT_EXPIRE_HOURS='${{ secrets.JWT_EXPIRE_HOURS }}'
          export BCRYPT_ROUNDS='${{ secrets.BCRYPT_ROUNDS }}'
          export COOKIE_DOMAIN='${{ secrets.COOKIE_DOMAIN }}'
          export COOKIE_SECURE=True
          export ENVIRONMENT=production
          export REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}'
          export VIKUNJA_USERNAME='${{ secrets.VIKUNJA_USERNAME }}'
          export VIKUNJA_PASSWORD='${{ secrets.VIKUNJA_PASSWORD }}'
          export ACTUAL_HTTP_API_KEY='${{ secrets.ACTUAL_HTTP_API_KEY }}'
          export ACTUAL_BUDGET_SYNC_ID='${{ secrets.ACTUAL_BUDGET_SYNC_ID }}'
          export ACTUAL_SERVER_URL='${{ secrets.ACTUAL_SERVER_URL }}'
          export ACTUAL_SERVER_PASSWORD='${{ secrets.ACTUAL_SERVER_PASSWORD }}'
          export OPEN_ROUTER_KEY='${{ secrets.OPEN_ROUTER_KEY }}'
          export SERPER_API_KEY='${{ secrets.SERPER_API_KEY }}'
          export BRAIN_NOTES_PATH='${{ secrets.BRAIN_NOTES_PATH }}'
          export BRAIN_GIT_REMOTE='${{ secrets.BRAIN_GIT_REMOTE }}'
          export MCP_API_KEY='${{ secrets.MCP_API_KEY }}'
          export HERMES_API_KEY='${{ secrets.HERMES_API_KEY }}'
          export OAUTH_SERVER_URL='${{ secrets.OAUTH_SERVER_URL }}'
          EOF
          chmod 600 /tmp/deploy.env
          scp deploy-api.sh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}:~/deploy-api.sh
          scp /tmp/deploy.env ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}:/tmp/deploy.env
          ssh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }} "chmod +x ~/deploy-api.sh && chmod 600 /tmp/deploy.env"
          rm /tmp/deploy.env
        shell: bash

      - name: Launch deploy on Pi
        run: |
          ssh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }} "
          rm -f /tmp/deploy.log /tmp/deploy.exit
          nohup bash -c 'cd ~ && source /tmp/deploy.env && ./deploy-api.sh > /tmp/deploy.log 2>&1; echo \$? > /tmp/deploy.exit; rm -f /tmp/deploy.env' > /dev/null 2>&1 &
          disown
          sleep 2
          echo 'Deploy launched'
          "
        shell: bash

      - name: Wait for deployment
        timeout-minutes: 30
        run: |
          HOST="${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}"
          echo "Polling deploy status every 10s (max 30 min)..."
          for i in $(seq 1 180); do
            result=$(ssh -o ConnectTimeout=10 "$HOST" \
              "[ -f /tmp/deploy.exit ] && echo done:\$(cat /tmp/deploy.exit) || echo running" 2>/dev/null || echo unreachable)
            echo "[$i/180] $result"
            case "$result" in
              done:0)
                echo "Deploy succeeded"
                exit 0
                ;;
              done:*)
                echo "Deploy failed — last 50 lines of log:"
                ssh "$HOST" "tail -50 /tmp/deploy.log" 2>/dev/null || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out after 30 minutes"
          exit 1
        shell: bash

      - name: Generate deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Successfully deployed to Raspberry Pi" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** \`$(date -u)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The application has been successfully deployed to production using the latest Docker image from GHCR." >> $GITHUB_STEP_SUMMARY
